name: Nightly Firebase Test Lab

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC daily
  workflow_dispatch:

jobs:
  ftl-matrix:
    name: Firebase Test Lab — ${{ matrix.device.model }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        device:
          - { model: 'Pixel8',   version: '34', locale: 'en', orientation: 'portrait' }
          - { model: 'oriole',   version: '33', locale: 'en', orientation: 'portrait' }   # Pixel 6
          - { model: 'cloudbook', version: '32', locale: 'en', orientation: 'portrait' }  # Pixel 6a
          - { model: 'a54xnsxx', version: '33', locale: 'en', orientation: 'portrait' }   # Samsung A54
          - { model: 'a14xnsxx', version: '33', locale: 'en', orientation: 'portrait' }   # Samsung A14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create placeholder google-services.json
        run: |
          cat > app/google-services.json << 'EOF'
          {
            "project_info": { "project_id": "night-catchers-placeholder" },
            "client": [{
              "client_info": { "mobilesdk_app_id": "1:000000000000:android:placeholder" },
              "services": { "appinvite_service": { "other_platform_oauth_client": [] } }
            }],
            "configuration_version": "1"
          }
          EOF

      - name: Build instrumented test APK
        run: ./gradlew assembleDebug assembleDebugAndroidTest --no-daemon

      - name: Run tests on Firebase Test Lab
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app app/build/outputs/apk/debug/app-debug.apk \
            --test app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --device model=${{ matrix.device.model }},version=${{ matrix.device.version }},locale=${{ matrix.device.locale }},orientation=${{ matrix.device.orientation }} \
            --timeout 10m \
            --results-bucket gs://night-catchers-ftl-results \
            --results-dir nightly/${{ github.run_id }}/${{ matrix.device.model }}

      - name: Download FTL results
        if: always()
        run: |
          gsutil -m cp -r \
            gs://night-catchers-ftl-results/nightly/${{ github.run_id }}/${{ matrix.device.model }} \
            ./ftl-results/ || true

      - name: Upload FTL results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ftl-results-${{ matrix.device.model }}
          path: ftl-results/
          retention-days: 14
